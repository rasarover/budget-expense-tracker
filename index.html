<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BudgetPro — Personal Finance Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Auth gate overlay (shown while checking session) ── */
    #auth-gate {
      position: fixed; inset: 0;
      background: var(--bg, #f1f5f9);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
    }
    .auth-gate-inner { text-align: center; }
    .auth-gate-logo {
      width: 56px; height: 56px;
      background: linear-gradient(135deg,#f97316,#f59e0b);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 24px; margin: 0 auto 12px;
    }
    .auth-gate-spin {
      width: 24px; height: 24px;
      border: 3px solid #e5e5e5; border-top-color: #f97316;
      border-radius: 50%; animation: spin .7s linear infinite;
      margin: 16px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Auth gate — shown briefly while session is verified -->
<div id="auth-gate">
  <div class="auth-gate-inner">
    <div class="auth-gate-logo"><i class="fas fa-wallet"></i></div>
    <div style="font-size:18px;font-weight:800;color:#171717">BudgetPro</div>
    <div class="auth-gate-spin"></div>
  </div>
</div>

<div class="app-layout" id="app" style="display:none">

  <!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-logo">
      <div class="logo-icon"><i class="fas fa-wallet"></i></div>
      <div>
        <div class="logo-text">BudgetPro</div>
        <div class="logo-sub">Personal Finance</div>
      </div>
    </div>

    <nav class="sidebar-nav">

      <div class="nav-section-label">Main</div>
      <div class="nav-item active" data-view="dashboard" onclick="navigate('dashboard')">
        <span class="nav-icon"><i class="fas fa-chart-pie"></i></span>
        Dashboard
      </div>

      <div class="nav-section-label">Finance</div>
      <div class="nav-item" data-view="budget" onclick="navigate('budget')">
        <span class="nav-icon"><i class="fas fa-wallet"></i></span>
        Budget Planner
      </div>
      <div class="nav-item" data-view="expenses" onclick="navigate('expenses')">
        <span class="nav-icon"><i class="fas fa-receipt"></i></span>
        Expenses
      </div>
      <div class="nav-item" data-view="income" onclick="navigate('income')">
        <span class="nav-icon"><i class="fas fa-coins"></i></span>
        Income
      </div>

      <div class="nav-section-label">Wealth</div>
      <div class="nav-item" data-view="investments" onclick="navigate('investments')">
        <span class="nav-icon"><i class="fas fa-chart-line"></i></span>
        Investments
      </div>

      <div class="nav-section-label">Other</div>
      <div class="nav-item" data-view="settings" onclick="navigate('settings')">
        <span class="nav-icon"><i class="fas fa-cog"></i></span>
        Settings
      </div>

    </nav>

    <div class="sidebar-footer">
      <!-- User info -->
      <div class="sidebar-user" onclick="navigate('settings')" title="Account settings">
        <div class="user-avatar" id="user-avatar">A</div>
        <div style="flex:1;min-width:0">
          <div class="user-name" id="user-name-display">User</div>
          <div class="user-sub" id="user-email-display" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></div>
        </div>
      </div>
      <!-- Logout button -->
      <div style="padding:6px 10px 2px">
        <button onclick="logout()" style="width:100%;display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:none;border:1.5px solid var(--border);color:var(--text-muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .18s" onmouseover="this.style.borderColor='#ef4444';this.style.color='#ef4444'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-muted)'">
          <i class="fas fa-sign-out-alt"></i> Sign Out
        </button>
      </div>
    </div>

  </aside>

  <!-- ── Main Content ───────────────────────────────────────────────────────── -->
  <div class="main-content">

    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-btn hamburger" id="hamburger" title="Toggle Menu">
          <i class="fas fa-bars"></i>
        </button>
        <div>
          <div class="page-title" id="topbar-title">Dashboard</div>
          <div class="page-subtitle" id="topbar-subtitle">Overview of your finances</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="month-selector hidden" id="month-wrap" title="Select month">
          <i class="fas fa-calendar-alt" style="color:var(--primary);font-size:12px"></i>
          <input type="month" id="month-input">
        </div>
        <button class="icon-btn" id="theme-toggle" title="Toggle Dark Mode">
          <i class="fas fa-moon"></i>
        </button>
        <button class="icon-btn" onclick="navigate('settings')" title="Settings">
          <i class="fas fa-cog"></i>
        </button>
      </div>
    </header>

    <main class="page-content" id="page-content"></main>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="js/data.js"></script>
<script src="js/auth-check.js"></script>
<script src="js/app.js"></script>

</body>
</html>
